<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<title>WallKeepers</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Segoe UI',sans-serif; }
canvas { display:block; }
#debug-panel { position:fixed; top:8px; left:8px; z-index:9999; font-family:'Segoe UI',sans-serif; user-select:none; }
#debug-toggle { background:rgba(0,0,0,0.75); color:#fff; border:1px solid #555; border-radius:6px; padding:4px 10px; cursor:pointer; font-size:16px; line-height:1.4; }
#debug-toggle:hover { background:rgba(40,40,40,0.9); }
#debug-body { display:none; background:rgba(0,0,0,0.82); border:1px solid #555; border-radius:8px; margin-top:4px; padding:8px 10px 10px; width:196px; }
#debug-body.open { display:block; }
.dbg-section { color:#888; font-size:10px; text-transform:uppercase; margin:6px 0 3px; letter-spacing:0.5px; }
.dbg-row { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-bottom:4px; }
.dbg-row.full { grid-template-columns:1fr; }
.dbg-btn { background:#2a2a2a; color:#ddd; border:1px solid #4a4a4a; border-radius:4px; padding:5px 0; font-size:11px; cursor:pointer; text-align:center; }
.dbg-btn:hover { background:#3a3a3a; }
.dbg-btn.active { background:#1a6e2e; border-color:#2eb050; color:#fff; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="debug-panel">
  <button id="debug-toggle" title="Debug/Cheat-Panel">&#x1F6E0;</button>
  <div id="debug-body">
    <div class="dbg-section">Geschwindigkeit</div>
    <div class="dbg-row">
      <button class="dbg-btn active" id="spd-1" onclick="setGameSpeed(1)">&#9654; 1x</button>
      <button class="dbg-btn" id="spd-2" onclick="setGameSpeed(2)">&#9193; 2x</button>
    </div>
    <div class="dbg-row full">
      <button class="dbg-btn" id="spd-5" onclick="setGameSpeed(5)">&#9193;&#9193; 5x</button>
    </div>
    <div class="dbg-section">Gold</div>
    <div class="dbg-row">
      <button class="dbg-btn" onclick="debugGold(500)">&#x1F4B0; +500</button>
      <button class="dbg-btn" onclick="debugGold(9999)">&#x1F4B0; +9999</button>
    </div>
    <div class="dbg-section">Monster</div>
    <div class="dbg-row">
      <button class="dbg-btn" onclick="debugSpawn5()">&#x1F47E; Spawn 5</button>
      <button class="dbg-btn" onclick="debugSpawnWave()">&#x1F47E; Welle</button>
    </div>
    <div class="dbg-section">Welle</div>
    <div class="dbg-row full">
      <button class="dbg-btn" onclick="debugSkipWave()">&#x23ED; N&#xE4;chste Welle</button>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', () => { resize(); initLayout(); });
resize();

// ─── LAYOUT ────────────────────────────────────────────────────────────────
const MENU_H = 54;
const PANEL_W_RATIO = 0.2;
let W, H, PANEL_W, wallX, wallY, wallW, wallH;

function initLayout() {
  W = canvas.width; H = canvas.height;
  PANEL_W = Math.floor(W * PANEL_W_RATIO);
  wallX = 0;
  wallW = W;
  wallH = 40;
  wallY = Math.floor((H - MENU_H) * 0.70);
  if (wall) { wall.x = wallX; wall.y = wallY; wall.w = wallW; wall.h = wallH; }
  repositionSoldiers();
}

// ─── ROUNDRECT POLYFILL ────────────────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    r = Math.min(r, w/2, h/2);
    this.beginPath();
    this.moveTo(x+r,y); this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r); this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r); this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r); this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r); this.closePath();
  };
}

// ─── GAME STATE ───────────────────────────────────────────────────────────
let gs = {};
function resetGS() {
  gs = {
    screen: 'start',
    wave: 0,
    gold: 50,
    mana: 0, manaMax: 100, manaRegen: 1,
    paused: false,
    difficulty: 'normal',
    bestWave: parseInt(localStorage.getItem('wk_best') || '0'),
    activePanel: null,
    waveTimer: 5,
    waveDuration: 35,
    announcing: 0,
    shakeTimer: 0,
    spellEffects: [],
    buildings: { kaserne:false, schmiede:false, magierturm:false, lagerhaus:false, wachturm:false },
    machines: { katapult:false, ballista:false, oelkessel:false },
    machineTimers: { katapult:0, ballista:0, oelkessel:0 },
    upgrades: {
      dmgPurchases: 0, dmgCost: 30,
      speedPurchases: 0, speedCost: 50,
      archerCost: 100,
    },
    diffMult: 1,
    spawning: false,
    spawnQueue: [],
    spawnTimer: 0,
    waveCleared: false,
    kills: 0,
    kills: 0,
    kills: 0,
  };
}
resetGS();

// ─── WALL (HORIZONTAL) ────────────────────────────────────────────────────
const wall = { x:0, y:0, w:0, h:40, hp:500, maxHp:500,
  takeDamage(d){ this.hp=Math.max(0,this.hp-d); if(this.hp===0) gameOver(); },
  repair(a){ this.hp=Math.min(this.maxHp,this.hp+a); },
  reinforce(a){ this.maxHp+=a; this.hp+=a; },
  get pct(){ return this.hp/this.maxHp; },
  draw(){
    // ── TOP-DOWN WALL: thick stone band seen from above ──

    // Drop shadow toward enemy side (above)
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(this.x, this.y - 4, this.w, this.h + 8);

    // Main wall body — mid-grey stone
    const wallGrad = ctx.createLinearGradient(0, this.y, 0, this.y + this.h);
    wallGrad.addColorStop(0, '#8a8270');
    wallGrad.addColorStop(0.5, '#726a58');
    wallGrad.addColorStop(1, '#5e5648');
    ctx.fillStyle = wallGrad;
    ctx.fillRect(this.x, this.y, this.w, this.h);

    // Cobblestone texture: two staggered rows of rectangles viewed from above
    const stW = 32, stH = 8;
    for(let row = 0; row < 4; row++){
      const rowY = this.y + 1 + row * (stH + 1);
      const offset = (row % 2) * (stW / 2);
      for(let sx = -stW + offset; sx < this.w; sx += stW){
        // stone base
        ctx.fillStyle = row % 2 === 0 ? '#7a7260' : '#706858';
        ctx.fillRect(sx + 1, rowY, stW - 2, stH);
        // top highlight
        ctx.fillStyle = 'rgba(255,255,255,0.09)';
        ctx.fillRect(sx + 1, rowY, stW - 2, 2);
        // left shadow
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(sx + 1, rowY, 1, stH);
      }
    }

    // Mortar lines (vertical, darker gaps between stones)
    ctx.strokeStyle = '#2e2820'; ctx.lineWidth = 1.5;
    for(let bx = 0; bx < this.w; bx += stW){
      ctx.beginPath(); ctx.moveTo(bx, this.y); ctx.lineTo(bx, this.y + this.h); ctx.stroke();
    }
    // Horizontal mortar line (middle row divider)
    ctx.beginPath(); ctx.moveTo(0, this.y + stH + 1); ctx.lineTo(this.w, this.y + stH + 1); ctx.stroke();

    // Crenellations at enemy-facing edge (top of wall band) — seen from above as square protrusions
    ctx.fillStyle = '#9a9280';
    for(let cx = 6; cx < this.w; cx += 26){
      ctx.fillRect(cx, this.y - 9, 14, 10);
      // mortar between crenels
      ctx.strokeStyle = '#3a3428'; ctx.lineWidth = 1;
      ctx.strokeRect(cx, this.y - 9, 14, 10);
      // top highlight on crenel
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(cx, this.y - 9, 14, 2);
      ctx.fillStyle = '#9a9280';
    }

    // Bright top edge (sunlit top face of wall)
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(this.x, this.y, this.w, 2);
    // Dark bottom edge (shadow cast downward)
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(this.x, this.y + this.h - 2, this.w, 3);

    // HP bar
    const bw=180, bh=13, bx=this.w/2-bw/2, by=this.y+this.h+8;
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.roundRect(bx-1,by-1,bw+2,bh+2,3); ctx.fill();
    const pc=this.pct, hc=pc>0.55?'#4caf50':pc>0.28?'#ff9800':'#f44336';
    ctx.fillStyle=hc; ctx.beginPath(); ctx.roundRect(bx,by,bw*pc,bh,2); ctx.fill();
    ctx.strokeStyle='#666'; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,2); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 9px monospace'; ctx.textAlign='center';
    ctx.fillText(`WALL  ${Math.ceil(this.hp)} / ${this.maxHp}`,bx+bw/2,by+bh-2);
  }
};

MDEFS = {
  goblin:{ name:'Goblin', hp:10, spd:70, dmg:8, gold:5, r:9, col:'#3ddc84', out:'#1a8a50' },
  orc:   { name:'Orc',    hp:70, spd:40, dmg:18, gold:15, r:14, col:'#e74c3c', out:'#8B0000' },
  troll: { name:'Troll',  hp:250, spd:25, dmg:35, gold:40, r:20, col:'#9b59b6', out:'#5a1e7a' },
};
class Monster {
  constructor(type, x, hpMult=1, speedMult=1) {
    const d=MDEFS[type];
    this.type=type; this.name=d.name;
    this.x=x; this.y=-(d.r+10);
    this.maxHp=Math.round(d.hp*hpMult*gs.diffMult); this.hp=this.maxHp;
    this.spd=d.spd*speedMult; this.dmg=d.dmg; this.gold=d.gold; this.r=d.r;
    this.col=d.col; this.out=d.out;
    this.dead=false; this.attacking=false; this.atkTimer=0; this.wobble=0; this.wobDir=1;
    this.slowed=0; this.slowTimer=0; this.tick=0;
  }
  get effectiveSpd(){ return this.spd*(this.slowed?0.45:1); }
  update(dt){
    if(this.dead) return;
    this.tick++;
    if(this.slowTimer>0){ this.slowTimer-=dt; if(this.slowTimer<=0) this.slowed=false; }
    this.wobble+=dt*8*this.wobDir; if(Math.abs(this.wobble)>0.4) this.wobDir*=-1;
    if(!this.attacking){
      this.y+=this.effectiveSpd*dt;
      if(this.y+this.r>=wall.y){ this.y=wall.y-this.r; this.attacking=true; }
    }
    if(this.attacking){ this.atkTimer+=dt; }
  }
  getWallDmg(){ if(!this.attacking||this.dead) return 0; const a=Math.floor(this.atkTimer); this.atkTimer-=a; return a*this.dmg; }
  takeDmg(d){ this.hp-=d; if(this.hp<=0){this.hp=0;this.dead=true;} }
  draw(){
    if(this.dead) return;
    const ss = SPRITE_SHEETS[this.type];
    const frame = Math.floor(this.tick / 8) % ss.frames;
    const sx = frame * ss.fw;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.wobble * 0.07);
    // Ground shadow
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath();
    ctx.ellipse(2, ss.fh * 0.48, ss.fw * 0.38, ss.fh * 0.12, 0, 0, Math.PI*2);
    ctx.fill();
    // Sprite or fallback circle
    if(ss.img && ss.img.complete && ss.img.naturalWidth > 0){
      if(this.slowed){
        ctx.save();
        ctx.globalAlpha = 0.38;
        ctx.fillStyle = '#4aa8d8';
        ctx.fillRect(-ss.fw/2, -ss.fh/2, ss.fw, ss.fh);
        ctx.restore();
      }
      ctx.save(); ctx.rotate(Math.PI / 2);
      ctx.drawImage(ss.img, sx, 0, ss.fw, ss.fh, -ss.fw/2, -ss.fh/2, ss.fw, ss.fh);
      ctx.restore();
    } else {
      ctx.fillStyle = this.slowed ? '#6bb3dd' : this.col;
      ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = this.out; ctx.lineWidth=2; ctx.stroke();
    }
    ctx.restore();
    // Attacking glow
    if(this.attacking){
      ctx.strokeStyle='rgba(255,200,0,0.65)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r+5,0,Math.PI*2); ctx.stroke();
    }
    // HP bar above sprite
    const bw=ss.fw*0.9, bx=this.x-bw/2, by=this.y-ss.fh/2-7;
    ctx.fillStyle='#222'; ctx.fillRect(bx,by,bw,4);
    const pc=this.hp/this.maxHp;
    ctx.fillStyle=pc>0.5?'#4caf50':pc>0.25?'#ff9800':'#f44336';
    ctx.fillRect(bx,by,bw*pc,4);
  }
}

// ─── SOLDIER ──────────────────────────────────────────────────────────────
class Soldier {
  constructor(x,y,type='archer'){ this.x=x; this.y=y; this.type=type; this.angle=-Math.PI/2; this.atkTimer=0; this.target=null; this.state='idle'; this.chargeTarget=null; this.dead=false; }
  get damage(){ return baseDmg + (gs.buildings.schmiede?baseDmg*.1:0); }
  get fireRate(){ return baseFireRate; }
  get range(){ return this.type==='archer' ? W : 80; }
  update(dt, onShoot){
    if(this.type==='spear'){
      if(this.state==='charging'){
        if(!this.chargeTarget||this.chargeTarget.dead){this.dead=true;return;}
        const dx=this.chargeTarget.x-this.x,dy=this.chargeTarget.y-this.y,dist=Math.hypot(dx,dy);
        if(dist<14){
          this.chargeTarget.hp=0;this.chargeTarget.dead=true;
          onMonsterHit(this.chargeTarget);
          for(let i=0;i<6;i++) addParticle(this.x+(Math.random()*40-20),this.y+(Math.random()*40-20),'#ff6600');
          this.dead=true;
        } else {
          this.x+=(dx/dist)*6;this.y+=(dy/dist)*6;
          this.angle=Math.atan2(dy,dx);this.target=this.chargeTarget;
        }
        return;
      }
      const alive=monsters.filter(m=>!m.dead);
      if(alive.length>0){
        const near=alive.reduce((a,b)=>Math.hypot(b.x-this.x,b.y-this.y)<Math.hypot(a.x-this.x,a.y-this.y)?b:a);
        this.angle=Math.atan2(near.y-this.y,near.x-this.x);this.target=near;
        if(Math.hypot(near.x-this.x,near.y-wall.y)<150){this.state='charging';this.chargeTarget=near;}
      } else {this.target=null;}
      return;
    }
    let nearest=null, nd=Infinity;
    for(const m of monsters){
      if(m.dead) continue;
      const dx=m.x-this.x, dy=m.y-this.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<=this.range && dist<nd){nearest=m; nd=dist;}
    }
    this.target=nearest;
    if(nearest){ this.angle=Math.atan2(nearest.y-this.y,nearest.x-this.x); this.atkTimer+=dt; if(this.atkTimer>=1/this.fireRate){this.atkTimer-=1/this.fireRate;onShoot(this,nearest);} }
    else { this.atkTimer=Math.min(this.atkTimer+dt,1/this.fireRate); }
  }
  draw(){
    const r = 10;
    const col = this.type === 'archer' ? '#2980b9' : '#c0392b';
    const outlineCol = this.type === 'archer' ? '#1a5276' : '#7b241c';
    const highlightCol = this.type === 'archer' ? '#5dade2' : '#e74c3c';

    ctx.save(); ctx.translate(this.x, this.y);

    if(this.type==='spear'&&this.state==='charging'){
      ctx.strokeStyle='rgba(255,120,0,0.85)';ctx.lineWidth=4;
      ctx.beginPath();ctx.arc(0,0,r+6,0,Math.PI*2);ctx.stroke();
    }

    // Ground shadow
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath(); ctx.ellipse(3, 4, r * 0.9, r * 0.38, 0, 0, Math.PI * 2); ctx.fill();

    // Main body circle (top-down)
    const bodyGrad = ctx.createRadialGradient(-r*0.3, -r*0.3, 1, 0, 0, r);
    bodyGrad.addColorStop(0, highlightCol);
    bodyGrad.addColorStop(1, col);
    ctx.fillStyle = bodyGrad;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = outlineCol; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();

    // Inner ring detail (armor/shield indicator)
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, r * 0.6, 0, Math.PI * 2); ctx.stroke();

    if(this.target){
      ctx.save(); ctx.rotate(this.angle);

      // Directional triangle pointing at target
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.moveTo(r + 4, 0);
      ctx.lineTo(r - 1, -3.5);
      ctx.lineTo(r - 1,  3.5);
      ctx.closePath(); ctx.fill();

      if(this.type === 'archer'){
        // Bow arc on the side facing the target
        ctx.strokeStyle = '#e8c060'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(r + 3, 0, 7, -Math.PI * 0.58, Math.PI * 0.58);
        ctx.stroke();
        // Bowstring (straight line connecting bow ends)
        const bsY = Math.sin(Math.PI * 0.58) * 7;
        ctx.strokeStyle = 'rgba(220,180,80,0.55)'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(r + 3 + Math.cos(-Math.PI * 0.58) * 7, -bsY);
        ctx.lineTo(r + 3 + Math.cos( Math.PI * 0.58) * 7,  bsY);
        ctx.stroke();
        ctx.lineCap = 'butt';
      }

      if(this.type === 'spear'){
        // Spear shaft from center outward toward target
        ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(r + 14, 0); ctx.stroke();
        // Spear tip
        ctx.fillStyle = '#c8c8c8';
        ctx.beginPath();
        ctx.moveTo(r + 16, 0);
        ctx.lineTo(r + 10, -3.5);
        ctx.lineTo(r + 10,  3.5);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = '#888'; ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(r + 16, 0); ctx.lineTo(r + 10, -3.5); ctx.lineTo(r + 10, 3.5); ctx.closePath(); ctx.stroke();
        ctx.lineCap = 'butt';
      }

      ctx.restore();
    } else {
      // Idle: small dot in center
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, Math.PI * 2); ctx.fill();
    }

    if(this.type==='spear'&&this.state==='idle'){
      ctx.font='14px serif';ctx.textAlign='center';ctx.fillStyle='#ffd700';
      ctx.fillText('⚡',0,-r-6);
    }

    ctx.restore();
  }
}

// ─── PROJECTILE ───────────────────────────────────────────────────────────
class Projectile {
  constructor(x,y,target,dmg){ this.x=x;this.y=y;this.target=target;this.dmg=dmg;this.spd=400;this.hit=false;this.trail=[]; }
  update(dt){
    if(this.hit) return;
    if(this.target.dead){this.hit=true;return;}
    const dx=this.target.x-this.x,dy=this.target.y-this.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<this.target.r+4){this.target.takeDmg(this.dmg);this.hit=true;onMonsterHit(this.target);return;}
    this.trail.push({x:this.x,y:this.y}); if(this.trail.length>6) this.trail.shift();
    const nx=dx/dist,ny=dy/dist; this.x+=nx*this.spd*dt; this.y+=ny*this.spd*dt;
  }
  draw(){
    if(this.hit) return;
    for(let i=0;i<this.trail.length;i++){ ctx.fillStyle=`rgba(255,200,80,${(i/this.trail.length)*.35})`; ctx.beginPath(); ctx.arc(this.trail[i].x,this.trail[i].y,2,0,Math.PI*2); ctx.fill(); }
    ctx.fillStyle='#ffe080'; ctx.beginPath(); ctx.arc(this.x,this.y,3.5,0,Math.PI*2); ctx.fill();
  }
}

function repositionSoldiers(){
  if(!soldiers.length) return;

  soldiers.forEach((s,i)=>{ s.x = spacing*(i+1); s.y = wall.y - 22; });
}

  soldiers=[];

// ─── WAVE SPAWNING ────────────────────────────────────────────────────────
function buildSpawnQueue(waveNum){
  const count=Math.floor(5*Math.pow(1.3,waveNum-1));
  const hpMult=Math.pow(1.25,waveNum-1);
  const speedMult=1+(waveNum-1)*0.08;
  const q=[];
  for(let i=0;i<count;i++){
    let type='goblin';
    if(waveNum>=15){ const r=Math.random(); type=r<0.2?'goblin':r<0.55?'orc':'troll'; }
    else if(waveNum>=10){ const r=Math.random(); type=r<0.35?'goblin':r<0.75?'orc':'troll'; }
    else if(waveNum>=5){ type=Math.random()<0.5?'goblin':'orc'; }
    const x = 20 + Math.random()*(W-40);
    q.push({type,x,hpMult,speedMult});
  }
  return q;
}

function startWave(){
  gs.wave++;
  if(gs.buildings.wachturm) addSoldier('archer');
  gs.spawnQueue=buildSpawnQueue(gs.wave);
  gs.spawning=true;
  gs.spawnTimer=0;
  gs.announcing=2.5;
  gs.waveCleared=false;
}

// ─── MACHINES ─────────────────────────────────────────────────────────────
function updateMachines(dt){
  if(gs.machines.katapult){
    gs.machineTimers.katapult-=dt;
    if(gs.machineTimers.katapult<=0){
      gs.machineTimers.katapult=5;
      const alive=monsters.filter(m=>!m.dead);
      alive.forEach(m=>{m.takeDmg(60);onMonsterHit(m);});
      gs.spellEffects.push({type:'katapult',timer:0.4});
    }
  }
  if(gs.machines.ballista){
    gs.machineTimers.ballista-=dt;
    if(gs.machineTimers.ballista<=0){
      gs.machineTimers.ballista=3;
      const alive=monsters.filter(m=>!m.dead);
      if(alive.length){ let t=alive.reduce((a,b)=>b.hp>a.hp?b:a); t.takeDmg(120); onMonsterHit(t); }
    }
  }
}

// ─── ON MONSTER HIT / DEATH ───────────────────────────────────────────────
function onMonsterHit(m){
  if(m.dead){
    addFloat(m.x,m.y,`+${m.gold}g`,'#ffd700');
    gs.gold=Math.min(goldCap(),gs.gold+m.gold);
    addParticle(m.x,m.y,m.col);
    gs.kills++;
    for(let i=0;i<5;i++){
      const a=Math.random()*Math.PI*2,sp=30+Math.random()*50;
      deathParticles.push({x:m.x,y:m.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,col:m.col,alpha:1,r:2+Math.random()*3});
    }
  }
}

function goldCap(){ return gs.buildings.lagerhaus?14999:9999; }

// ─── SPELLS ───────────────────────────────────────────────────────────────
function castSpell(name){
  if(name==='feuerball'&&gs.mana>=30){ gs.mana-=30; monsters.filter(m=>!m.dead).forEach(m=>{m.takeDmg(80);onMonsterHit(m);}); gs.spellEffects.push({type:'fire',timer:0.5}); }
  if(name==='eisblitz'&&gs.mana>=50){ gs.mana-=50; monsters.filter(m=>!m.dead).forEach(m=>{m.slowed=true;m.slowTimer=5;}); gs.spellEffects.push({type:'ice',timer:0.5}); }
  if(name==='blitz'&&gs.mana>=40){ gs.mana-=40; const alive=monsters.filter(m=>!m.dead); if(alive.length){let t=alive.reduce((a,b)=>b.hp>a.hp?b:a);t.takeDmg(120);onMonsterHit(t);} gs.spellEffects.push({type:'lightning',timer:0.3}); }
}

  ctx.beginPath(); ctx.roundRect(x,y,w,h,5); ctx.fill();
  ctx.strokeStyle=disabled?'#333':hov?'#4a8aff':'#2a4a8a'; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(x,y,w,h,5); ctx.stroke();
  ctx.fillStyle=disabled?'#666':'#fff'; ctx.font=`13px 'Segoe UI'`; ctx.textAlign='left';
  ctx.fillText(label,x+10,y+h/2+5);
  if(cost!==null){
    ctx.fillStyle=canAfford?'#ffd700':'#888'; ctx.textAlign='right'; ctx.font='bold 12px monospace';

// ─── BACKGROUND ───────────────────────────────────────────────────────────
function drawBackground(){
  // ── ENEMY ZONE: above wall — dark reddish dirt, enemy territory ──
  const enemyGrad = ctx.createLinearGradient(0, 0, 0, wall.y);
  enemyGrad.addColorStop(0, '#0e0604');
  enemyGrad.addColorStop(0.55, '#170b08');
  enemyGrad.addColorStop(1, '#221110');
  ctx.fillStyle = enemyGrad;
  ctx.fillRect(0, 0, W, wall.y);

  // Enemy zone ground texture (subtle grid — trampled dirt look)
  ctx.strokeStyle = 'rgba(100,35,18,0.16)';
  ctx.lineWidth = 1;
  const gSz = 38;
  for(let gx = 0; gx < W; gx += gSz){
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, wall.y); ctx.stroke();
  }
  for(let gy = 0; gy < wall.y; gy += gSz){
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  // ── FRIENDLY ZONE: below wall — warm green grass ──
  const friendlyGrad = ctx.createLinearGradient(0, wall.y + wall.h, 0, H - MENU_H);
  friendlyGrad.addColorStop(0, '#112811');
  friendlyGrad.addColorStop(1, '#0a1c0a');
  ctx.fillStyle = friendlyGrad;
  ctx.fillRect(0, wall.y + wall.h, W, H - MENU_H - wall.y - wall.h);

  // Friendly zone grass texture
  ctx.strokeStyle = 'rgba(18,58,14,0.20)';
  ctx.lineWidth = 1;
  for(let gx = 0; gx < W; gx += gSz){
    ctx.beginPath(); ctx.moveTo(gx, wall.y + wall.h); ctx.lineTo(gx, H - MENU_H); ctx.stroke();
  }
  for(let gy = wall.y + wall.h; gy < H - MENU_H; gy += gSz){
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  // ── ENEMY CAMP TENTS (top-down view: circles with panel lines + center pole) ──
  const tentDefs = [
    {fx:0.055, fy:0.10}, {fx:0.185, fy:0.18}, {fx:0.325, fy:0.065},
    {fx:0.500, fy:0.135}, {fx:0.645, fy:0.075}, {fx:0.795, fy:0.195},
    {fx:0.920, fy:0.115}
  ];
  for(const t of tentDefs){
    const tx = t.fx * W;
    const ty = t.fy * wall.y + 10;
    const tr = 16;
    // drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(tx + 4, ty + 4, tr, tr * 0.65, 0, 0, Math.PI * 2); ctx.fill();
    // tent body (brownish circle from above)
    const tentGrad = ctx.createRadialGradient(tx - tr * 0.3, ty - tr * 0.3, 1, tx, ty, tr);
    tentGrad.addColorStop(0, '#8a4820');
    tentGrad.addColorStop(1, '#5a2a0c');
    ctx.fillStyle = tentGrad;
    ctx.beginPath(); ctx.arc(tx, ty, tr, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#a86030'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(tx, ty, tr, 0, Math.PI * 2); ctx.stroke();
    // tent panel seams (lines from center to edge)
    ctx.strokeStyle = 'rgba(180,100,55,0.40)'; ctx.lineWidth = 1;
    for(let a = 0; a < Math.PI * 2; a += Math.PI / 3){
      ctx.beginPath(); ctx.moveTo(tx, ty);
      ctx.lineTo(tx + Math.cos(a) * tr, ty + Math.sin(a) * tr);
      ctx.stroke();
    }
    // center pole top
    ctx.fillStyle = '#2a1005';
    ctx.beginPath(); ctx.arc(tx, ty, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath(); ctx.arc(tx - 1, ty - 1, 1.5, 0, Math.PI * 2); ctx.fill();
  }

  // ── ROCKS scattered in enemy zone ──
  const rockDefs = [
    {fx:0.125, fy:0.40, rw:14, rh:9,  ang: 0.30},
    {fx:0.270, fy:0.285,rw:11, rh:7,  ang:-0.50},
    {fx:0.430, fy:0.465,rw:16, rh:10, ang: 0.80},
    {fx:0.575, fy:0.325,rw: 9, rh:6,  ang: 0.10},
    {fx:0.715, fy:0.435,rw:13, rh:8,  ang:-0.30},
    {fx:0.865, fy:0.305,rw:15, rh:9,  ang: 0.60},
    {fx:0.375, fy:0.225,rw: 8, rh:5,  ang: 1.00},
  ];
  for(const rk of rockDefs){
    const rx = rk.fx * W, ry = rk.fy * wall.y;
    // rock shadow
    ctx.fillStyle = 'rgba(0,0,0,0.30)';
    ctx.beginPath(); ctx.ellipse(rx + 2, ry + 2, rk.rw, rk.rh, rk.ang, 0, Math.PI * 2); ctx.fill();
    // rock body
    const rkGrad = ctx.createRadialGradient(rx - rk.rw * 0.3, ry - rk.rh * 0.3, 1, rx, ry, rk.rw);
    rkGrad.addColorStop(0, '#8a8270');
    rkGrad.addColorStop(1, '#585048');
    ctx.fillStyle = rkGrad;
    ctx.beginPath(); ctx.ellipse(rx, ry, rk.rw, rk.rh, rk.ang, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#706858'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.ellipse(rx, ry, rk.rw, rk.rh, rk.ang, 0, Math.PI * 2); ctx.stroke();
    // rock highlight
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath(); ctx.ellipse(rx - rk.rw * 0.28, ry - rk.rh * 0.28, rk.rw * 0.42, rk.rh * 0.38, rk.ang, 0, Math.PI * 2); ctx.fill();
  }

  // ── FRIENDLY ZONE decorations: small trees/bushes near edges ──
  const fzTop = wall.y + wall.h;
  const fzH   = H - MENU_H - fzTop;
  const treeDefs = [
    {fx:0.030, fy:0.22}, {fx:0.960, fy:0.55},
    {fx:0.025, fy:0.72}, {fx:0.970, fy:0.28},
  ];
  for(const tr of treeDefs){
    const tx = tr.fx * W, ty = fzTop + tr.fy * fzH;
    if(ty >= H - MENU_H - 8) continue;
    // tree shadow
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath(); ctx.ellipse(tx + 3, ty + 4, 11, 8, 0, 0, Math.PI * 2); ctx.fill();
    // tree canopy
    ctx.fillStyle = '#1a5a0a';
    ctx.beginPath(); ctx.arc(tx, ty, 10, 0, Math.PI * 2); ctx.fill();
    // highlight cluster
    ctx.fillStyle = '#2a7a14';
    ctx.beginPath(); ctx.arc(tx - 2.5, ty - 2.5, 5.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1e6a0e';
    ctx.beginPath(); ctx.arc(tx + 2, ty + 1, 4, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#0f3a06'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(tx, ty, 10, 0, Math.PI * 2); ctx.stroke();
  }
}


// ─── BUILDING ICONS ────────────────────────────────────────
function drawBuildingIcons(){
  const sz=40,gap=8;
  const bDefs=[
    {key:'kaserne',icon:'K',col:'#4a6a8a',label:'Kaserne'},
    {key:'schmiede',icon:'S',col:'#8a5a2a',label:'Schmiede'},
    {key:'magierturm',icon:'M',col:'#6a2a8a',label:'Magier'},
    {key:'lagerhaus',icon:'L',col:'#2a6a4a',label:'Lager'},
    {key:'wachturm',icon:'W',col:'#2a4a6a',label:'Wacht.'},
  ];
  const mDefs=[
    {key:'katapult',icon:'K!',col:'#8a4a0a',label:'Kata'},
    {key:'ballista',icon:'B!',col:'#6a2a0a',label:'Ballist'},
    {key:'oelkessel',icon:'OIL',col:'#5a3a0a',label:'Oel'},
  ];
  const builtB=bDefs.filter(b=>gs.buildings[b.key]);
  const builtM=mDefs.filter(m=>gs.machines[m.key]);
  const all=[...builtB,...builtM];
  if(!all.length) return;
  const totalW=all.length*(sz+gap)-gap;
  const startX=W/2-totalW/2;
  const iconY=wall.y+wall.h+20;
  all.forEach((item,i)=>{
    const bx=startX+i*(sz+gap);
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath();ctx.roundRect(bx,iconY,sz,sz,5);ctx.fill();
    ctx.strokeStyle=item.col;ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(bx,iconY,sz,sz,5);ctx.stroke();
    ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.fillStyle=item.col;
    ctx.fillText(item.icon,bx+sz/2,iconY+sz/2+4);
    ctx.font='7px monospace';ctx.fillStyle='#999';ctx.textAlign='center';
    ctx.fillText(item.label,bx+sz/2,iconY+sz-3);
  });
}
// ─── ANNOUNCE ─────────────────────────────────────────────────────────────
function drawAnnounce(){
  if(gs.announcing<=0) return;
  const alpha=Math.min(1,gs.announcing*1.5);
  ctx.save(); ctx.globalAlpha=alpha;
  const bannerGrad=ctx.createLinearGradient(0,H/2-70,0,H/2+50);
  bannerGrad.addColorStop(0,'rgba(0,0,0,0)');
  bannerGrad.addColorStop(0.3,'rgba(0,0,0,0.72)');
  bannerGrad.addColorStop(0.7,'rgba(0,0,0,0.72)');
  bannerGrad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bannerGrad; ctx.fillRect(0,H/2-70,W,120);
  ctx.font='bold 64px Segoe UI'; ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillText(`⚔ WELLE ${gs.wave} ⚔`,W/2+2,H/2+2);
  ctx.fillStyle='#ffd700'; ctx.fillText(`⚔ WELLE ${gs.wave} ⚔`,W/2,H/2);
  ctx.font='22px Segoe UI';
  const msg=gs.wave===1?'Kampf beginnt!':gs.wave<5?'Halte die Mauer!':gs.wave<10?'Sie werden stärker!':'ELITEWELLE — Vorsicht!';
  ctx.fillStyle='#ff9944'; ctx.fillText(msg,W/2,H/2+45);
  ctx.restore();
}

// ─── SPELL EFFECTS ────────────────────────────────────────────────────────
function drawSpellEffects(){
  gs.spellEffects.forEach(e=>{
    const a=e.timer*2;
    if(e.type==='fire'){ ctx.fillStyle=`rgba(255,100,0,${Math.min(0.35,a*.35)})`;ctx.fillRect(0,0,W,H-MENU_H); }
    if(e.type==='ice'){ ctx.fillStyle=`rgba(0,100,255,${Math.min(0.3,a*.3)})`;ctx.fillRect(0,0,W,H-MENU_H); }
    if(e.type==='lightning'){ ctx.fillStyle=`rgba(255,255,0,${Math.min(0.4,a*.4)})`;ctx.fillRect(0,0,W,H-MENU_H); }
    if(e.type==='katapult'){ ctx.fillStyle=`rgba(255,140,0,${Math.min(0.25,a*.25)})`;ctx.fillRect(0,0,W,H-MENU_H); }
  });
}

// ─── SCREENS ──────────────────────────────────────────────────────────────
function drawStartScreen(){
  ctx.fillStyle='#030810'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.5)';
  for(let s=0;s<120;s++){ ctx.fillRect((s*157+13)%W,(s*101+7)%H,1,1); }
  ctx.textAlign='center';
  ctx.font='bold 72px Segoe UI'; ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillText('⚔️ WALLKEEPERS',W/2+3,H/2-120+3);
  ctx.fillStyle='#ffd700'; ctx.fillText('⚔️ WALLKEEPERS',W/2,H/2-120);
  ctx.font='20px Segoe UI'; ctx.fillStyle='#8899cc';
  ctx.fillText('Verteidige die Mauer. Überlebe so lange wie möglich.',W/2,H/2-70);
  if(gs.bestWave>0){ ctx.fillStyle='#66aaff'; ctx.font='16px Segoe UI'; ctx.fillText(`🏆 Bestleistung: Welle ${gs.bestWave}`,W/2,H/2-40); }
  ctx.font='15px Segoe UI'; ctx.fillStyle='#aaa'; ctx.fillText('Schwierigkeitsgrad:',W/2,H/2);
  const diffs=[{id:'leicht',label:'🟢 Leicht'},{id:'normal',label:'🟡 Normal'},{id:'schwer',label:'🔴 Schwer'}];
  diffs.forEach((d,i)=>{
    const bw=130,bh=44,bx=W/2-210+i*145,by=H/2+15;
    ctx.fillStyle=gs.difficulty===d.id?'#1a3a6a':'#0f1a30';
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,8); ctx.fill();
    ctx.strokeStyle=gs.difficulty===d.id?'#4a8aff':'#2a3a5a'; ctx.lineWidth=2; ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,8); ctx.stroke();
    ctx.fillStyle=gs.difficulty===d.id?'#ffd700':'#8899cc'; ctx.font='15px Segoe UI'; ctx.textAlign='center';
    ctx.fillText(d.label,bx+bw/2,by+bh/2+5);
    startButtons.push({x:bx,y:by,w:bw,h:bh,action:'diff',id:d.id});
  });
  const pbw=200,pbh=56,pbx=W/2-pbw/2,pby=H/2+80;
  ctx.fillStyle='#1a5a1a'; ctx.beginPath(); ctx.roundRect(pbx,pby,pbw,pbh,10); ctx.fill();
  ctx.strokeStyle='#3aaa3a'; ctx.lineWidth=2; ctx.beginPath(); ctx.roundRect(pbx,pby,pbw,pbh,10); ctx.stroke();
  ctx.fillStyle='#7fff7f'; ctx.font='bold 22px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('🎮 SPIELEN',pbx+pbw/2,pby+pbh/2+8);
  startButtons.push({x:pbx,y:pby,w:pbw,h:pbh,action:'play'});
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 64px Segoe UI'; ctx.fillStyle='#f44336'; ctx.fillText('💀 NIEDERLAGE',W/2,H/2-80);
  ctx.font='28px Segoe UI'; ctx.fillStyle='#fff'; ctx.fillText(`Welle ${gs.wave} erreicht`,W/2,H/2-20);
  ctx.font='20px Segoe UI'; ctx.fillStyle='#ffd700'; ctx.fillText(`🏆 Bestleistung: Welle ${gs.bestWave}`,W/2,H/2+20);
  const rbw=220,rbh=56,rbx=W/2-rbw/2,rby=H/2+60;
  ctx.fillStyle='#1a2a5a'; ctx.beginPath(); ctx.roundRect(rbx,rby,rbw,rbh,10); ctx.fill();
  ctx.strokeStyle='#4a8aff'; ctx.lineWidth=2; ctx.beginPath(); ctx.roundRect(rbx,rby,rbw,rbh,10); ctx.stroke();
  ctx.fillStyle='#99bbff'; ctx.font='bold 20px Segoe UI'; ctx.fillText('🔄 Nochmal spielen',rbx+rbw/2,rby+rbh/2+7);
  goButtons.push({x:rbx,y:rby,w:rbw,h:rbh});
}

// ─── BUTTON STATE ─────────────────────────────────────────────────────────
let startButtons=[], goButtons=[];

// ─── GAME OVER ────────────────────────────────────────────────────────────
function gameOver(){
  if(gs.wave>gs.bestWave){ gs.bestWave=gs.wave; localStorage.setItem('wk_best',gs.wave); }
  gs.screen='gameover';
}

// ─── START GAME ───────────────────────────────────────────────────────────
function startGame(){
  resetGS();
  gs.screen='game';
  const dm={leicht:0.7,normal:1.0,schwer:1.4};
  gs.diffMult=dm[gs.difficulty]||1.0;
  wall.hp=500; wall.maxHp=500;
  baseDmg=15; baseFireRate=1.0;
  monsters=[]; projectiles=[];
  initSoldiers();
  gs.waveTimer=5;
}

// ─── INPUT ────────────────────────────────────────────────────────────────
function hitTest(btn,x,y){ return x>=btn.x&&x<=btn.x+btn.w&&y>=btn.y&&y<=btn.y+btn.h; }

canvas.addEventListener('mousemove',e=>{
  hoveredBtn=null;
  const x=e.offsetX,y=e.offsetY;
  for(const b of panelButtons){ if(hitTest(b,x,y)){hoveredBtn=b;break;} }
});

canvas.addEventListener('click',e=>{
  const x=e.offsetX,y=e.offsetY;
  if(gs.screen==='start'){
    for(const b of startButtons){
      if(hitTest(b,x,y)){
        if(b.action==='diff') gs.difficulty=b.id;
        if(b.action==='play') startGame();
      }
    }
    return;
  }
  if(gs.screen==='gameover'){
    for(const b of goButtons){ if(hitTest(b,x,y)){ gs.screen='start'; } }
    return;
  }
  if(gs.screen!=='game') return;
  for(const mb of menuButtons){ if(hitTest(mb,x,y)){ gs.activePanel=gs.activePanel===mb.id?null:mb.id; return; } }
  if(gs.activePanel){
    for(const b of panelButtons){
      if(hitTest(b,x,y)&&b.canAfford&&!b.isBuilt){
        handlePanelClick(b.label,b.cost);
        return;
      }
    }
  }
});

function handlePanelClick(label,cost){
  if(gs.activePanel==='upgrades'){
    if(label.startsWith('🏹')){ gs.gold-=cost; gs.upgrades.dmgPurchases++; baseDmg+=5; }
    else if(label.startsWith('⚡')){ gs.gold-=cost; gs.upgrades.speedPurchases++; baseFireRate+=0.2; }
    else if(label.startsWith('➕')){ gs.gold-=cost; addSoldier('archer'); }
    else if(label.startsWith('🗡️')){ gs.gold-=cost; addSoldier('spear'); }
  }
  else if(gs.activePanel==='buildings'){
    if(label.startsWith('Kaserne')){ gs.gold-=cost; gs.buildings.kaserne=true; }
    else if(label.startsWith('Schmiede')){ gs.gold-=cost; gs.buildings.schmiede=true; }
    else if(label.startsWith('Magierturm')){ gs.gold-=cost; gs.buildings.magierturm=true; gs.manaRegen+=2; }
    else if(label.startsWith('Lagerhaus')){ gs.gold-=cost; gs.buildings.lagerhaus=true; }
    else if(label.startsWith('Wachturm')){ gs.gold-=cost; gs.buildings.wachturm=true; }
  }
  else if(gs.activePanel==='wall'){
    if(label.startsWith('🛡️')){ gs.gold-=cost; wall.reinforce(100); }
    else if(label.startsWith('🔨')){ gs.gold-=cost; wall.repair(50); }
  }
  else if(gs.activePanel==='spells'){
    if(label.startsWith('🔥')) castSpell('feuerball');
    else if(label.startsWith('❄️')) castSpell('eisblitz');
    else if(label.startsWith('⚡')) castSpell('blitz');
  }
  else if(gs.activePanel==='machines'){
    if(label.startsWith('Katapult')){ gs.gold-=cost; gs.machines.katapult=true; gs.machineTimers.katapult=5; }
    else if(label.startsWith('Ballista')){ gs.gold-=cost; gs.machines.ballista=true; gs.machineTimers.ballista=3; }
    else if(label.startsWith('Öl')){ gs.gold-=cost; gs.machines.oelkessel=true; }
  }
}

window.addEventListener('keydown',e=>{
  if(e.code==='Space'&&gs.screen==='game'){ gs.paused=!gs.paused; e.preventDefault(); }
  if(e.code==='Escape'&&gs.screen==='game'){ gs.activePanel=null; }
});

// ─── UPDATE ───────────────────────────────────────────────────────────────
function update(dt){
  if(gs.screen!=='game'||gs.paused) return;
  dt=Math.min(dt,0.1);

  gs.mana=Math.min(gs.manaMax,gs.mana+gs.manaRegen*dt);

  gs.waveTimer-=dt;
  if(gs.waveTimer<=0&&!gs.spawning){ gs.waveTimer=gs.waveDuration; startWave(); }

  if(gs.announcing>0) gs.announcing-=dt;
  if(gs.shakeTimer>0) gs.shakeTimer-=dt;

  gs.spellEffects.forEach(e=>e.timer-=dt);
  gs.spellEffects=gs.spellEffects.filter(e=>e.timer>0);

  if(gs.spawning){
    gs.spawnTimer-=dt;
    if(gs.spawnTimer<=0&&gs.spawnQueue.length>0){
      const s=gs.spawnQueue.shift();
      monsters.push(new Monster(s.type, s.x, s.hpMult, s.speedMult||1));
      gs.spawnTimer=1.5;
    }
    if(gs.spawnQueue.length===0) gs.spawning=false;
  }

  for(const m of monsters){ m.update(dt); const dmg=m.getWallDmg(); if(dmg>0){ wall.takeDamage(dmg); gs.shakeTimer=0.2; } }
  monsters=monsters.filter(m=>!m.dead||true);

  for(const s of [...soldiers]){
    s.update(dt,(soldier,target)=>{
      projectiles.push(new Projectile(soldier.x,soldier.y,target,soldier.damage));
      shotLines.push({x1:soldier.x,y1:soldier.y,x2:target.x,y2:target.y,alpha:0.9});
    });
  }
  soldiers=soldiers.filter(s=>!s.dead);

  for(const p of projectiles) p.update(dt);
  projectiles=projectiles.filter(p=>!p.hit);

  if(gs.machines.oelkessel){ monsters.filter(m=>m.attacking&&!m.dead).forEach(m=>{m.slowed=true;m.slowTimer=0.5;}); }

  updateMachines(dt);

  floats.forEach(f=>{ f.y+=f.vy*dt; f.alpha-=dt*1.2; });
  floats.length>50&&floats.splice(0,floats.length-50);

  particles.forEach(p=>{ p.r+=dt*80; p.alpha-=dt*3; });
  deathParticles.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.88; p.vy*=0.88; p.alpha-=dt*2.5; });
  while(deathParticles.length>300) deathParticles.shift();
  shotLines.forEach(l=>l.alpha-=dt*5);
  while(shotLines.length>100) shotLines.shift();
  deathParticles.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.88; p.vy*=0.88; p.alpha-=dt*2.5; });
  while(deathParticles.length>300) deathParticles.shift();
  shotLines.forEach(l=>l.alpha-=dt*5);
  while(shotLines.length>100) shotLines.shift();
  deathParticles.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.88; p.vy*=0.88; p.alpha-=dt*2.5; });
  while(deathParticles.length>300) deathParticles.shift();
  shotLines.forEach(l=>l.alpha-=dt*5);
  while(shotLines.length>100) shotLines.shift();

  monsters=monsters.filter(m=>!m.dead);
}

// ─── DRAW ─────────────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  if(gs.screen==='start'){ startButtons=[]; drawStartScreen(); return; }
  if(gs.screen==='gameover'){ goButtons=[]; drawBackground(); drawGameOver(); return; }

  const sx=gs.shakeTimer>0?(Math.random()-.5)*8:0, sy=gs.shakeTimer>0?(Math.random()-.5)*8:0;
  ctx.save(); ctx.translate(sx,sy);

  drawBackground();
  drawSpellEffects();

  for(const m of monsters) m.draw();

  wall.draw();

  for(const s of soldiers) s.draw();

  for(const p of projectiles) p.draw();

  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.alpha);
    ctx.strokeStyle=p.col; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.stroke();
  }
  for(const p of deathParticles){
    if(p.alpha<=0) continue;
    ctx.globalAlpha=Math.max(0,p.alpha);
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  for(const l of shotLines){
    if(l.alpha<=0) continue;
    ctx.save(); ctx.globalAlpha=l.alpha*0.7;
    ctx.strokeStyle='rgba(255,220,80,0.9)'; ctx.lineWidth=1.5;
    ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(l.x1,l.y1); ctx.lineTo(l.x2,l.y2); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }

  for(const f of floats.filter(f=>f.alpha>0)){
    ctx.globalAlpha=f.alpha; ctx.fillStyle=f.col; ctx.font='bold 14px monospace'; ctx.textAlign='center';
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;

  ctx.restore();

  drawAnnounce();
  drawBuildingIcons();
  drawHUD();
  drawPanel();
  drawMenuBar();

  if(gs.paused){
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.font='bold 52px Segoe UI'; ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.fillText('⏸ PAUSE',W/2,H/2);
    ctx.font='18px Segoe UI'; ctx.fillStyle='#888'; ctx.fillText('Leertaste zum Fortfahren',W/2,H/2+45);
  }
}

// ─── LOOP ─────────────────────────────────────────────────────────────────

// === DEBUG PANEL ===
let gameSpeed = 1;
document.getElementById('debug-toggle').addEventListener('click', function() {
  document.getElementById('debug-body').classList.toggle('open');
});
function setGameSpeed(s) {
  gameSpeed = s;
  [1,2,5].forEach(function(v) {
    var el = document.getElementById('spd-'+v);
    if(el) el.classList.toggle('active', v===s);
  });
}
function debugGold(amount) {
  if(gs.screen !== 'game') return;
  gs.gold = Math.min(goldCap(), gs.gold + amount);
}
function debugSpawn5() {
  if(gs.screen !== 'game') return;
  var types = gs.wave >= 5 ? ['goblin','orc'] : ['goblin'];
  for(var i=0;i<5;i++){
    var type = types[Math.floor(Math.random()*types.length)];
    var x = 20 + Math.random()*(W-40);
    monsters.push(new Monster(type, x, 1, 1));
  }
}
function debugSpawnWave() {
  if(gs.screen !== 'game') return;
  var q = buildSpawnQueue(Math.max(gs.wave,1));
  q.forEach(function(s){ monsters.push(new Monster(s.type, s.x, s.hpMult, s.speedMult||1)); });
}
function debugSkipWave() {
  if(gs.screen !== 'game') return;
  gs.spawning = false;
  gs.spawnQueue = [];
  monsters = [];
  gs.waveTimer = 0;
  startWave();
}
let last=0;
function loop(ts){ const dt=(ts-last)/1000; last=ts; for(var _i=0;_i<gameSpeed;_i++) update(dt); draw(); requestAnimationFrame(loop); }

initLayout();
requestAnimationFrame(ts=>{ last=ts; requestAnimationFrame(loop); });
</script>
