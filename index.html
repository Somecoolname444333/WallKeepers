<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WallKeepers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; overflow: hidden; }
    canvas { display: block; cursor: pointer; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- Polyfill for roundRect (Chrome < 99) -->
  <script>
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.arcTo(x + w, y, x + w, y + r, r);
        this.lineTo(x + w, y + h - r);
        this.arcTo(x + w, y + h, x + w - r, y + h, r);
        this.lineTo(x + r, y + h);
        this.arcTo(x, y + h, x, y + h - r, r);
        this.lineTo(x, y + r);
        this.arcTo(x, y, x + r, y, r);
        this.closePath();
      };
    }
  </script>

  <!-- Entity classes -->
  <script src="src/entities/Wall.js"></script>
  <script src="src/entities/Monster.js"></script>
  <script src="src/entities/Soldier.js"></script>
  <script src="src/entities/Projectile.js"></script>

  <!-- System classes -->
  <script src="src/systems/Economy.js"></script>
  <script src="src/systems/UpgradeSystem.js"></script>
  <script src="src/systems/WaveManager.js"></script>

  <!-- UI -->
  <script src="src/ui/SidePanel.js"></script>

  <!-- Scene + entry -->
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
